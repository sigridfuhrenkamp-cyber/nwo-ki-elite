# Simple workflow for deploying static content to GitHub Pages
name: Deploy Gallery to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build and deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Debug - List repository contents
        run: |
          echo "=== Repository Root ==="
          ls -la
          echo ""
          echo "=== Checking for index.html ==="
          if [ -f index.html ]; then
            echo "✓ index.html found"
            head -5 index.html
          else
            echo "✗ index.html NOT found"
          fi
          echo ""
          echo "=== Checking .nojekyll ==="
          if [ -f .nojekyll ]; then
            echo "✓ .nojekyll found (Jekyll disabled)"
          else
            echo "✗ .nojekyll NOT found"
          fi
          echo ""
          echo "=== Artifacts directory ==="
          ls -la artifacts/ 2>/dev/null || echo "artifacts/ directory not found"

      - name: Verify index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "Error: index.html not found!"
            exit 1
          fi
          echo "index.html found - ready for deployment"

      - name: Setup Pages
        uses: actions/configure-pages@v5.0.0
        with:
          static_site_generator: disable
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          # Upload entire repository including screenshots and index.html
          path: '.'
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5

