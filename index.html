<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1f1f1f;
            --bg-hover: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #2a2a2a;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .filter-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 80px;
            z-index: 99;
            backdrop-filter: blur(10px);
        }

        .filter-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 1200px) {
            .gallery { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .gallery { grid-template-columns: 1fr; }
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 16/10;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border-color: var(--accent);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            z-index: 2;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .item-overlay {
            transform: translateY(0);
        }

        .item-title {
            font-size: 0.8rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .item-meta {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .item-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            padding: 0.25rem 0.5rem;
            background: rgba(0,0,0,0.7);
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            z-index: 3;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 2rem 0;
        }

        .pagination button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            min-width: 40px;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--accent);
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 600;
        }

        .pagination-info {
            color: var(--text-secondary);
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            position: relative;
            max-width: 98vw;
            max-height: 98vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox img {
            max-width: 100%;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-caption {
            margin-top: 1rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            text-align: center;
            max-width: 900px;
            padding: 0 1rem;
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 1001;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 1001;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .lightbox-prev { left: 30px; }
        .lightbox-next { right: 30px; }

        @media (max-width: 768px) {
            .lightbox-prev, .lightbox-next {
                width: 50px;
                height: 50px;
            }
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
            .lightbox-close {
                top: 10px;
                right: 10px;
                width: 44px;
                height: 44px;
            }
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>

        <div class="header-content">
            <h1>Screenshot Gallery</h1>
            <div class="stats" id="stats">Loading...</div>
        </div>
    </header>

    <div class="filter-bar">
        <div class="filter-content">
            <div class="search-box">

            <div class="filter-buttons">

                <button class="filter-btn" onclick="setCategory('video')" data-cat="video">Videos</button>
                <button class="filter-btn" onclick="setCategory('screenshot')" data-cat="screenshot">Screenshots</button>
            </div>
        </div>
    </div>

    <main class="container">
        <div id="loading" class="loading">

        <div id="gallery" class="gallery" style="display: none;"></div>

            <p>No screenshots found matching your criteria</p>
        </div>

        <div id="pagination" class="pagination" style="display: none;"></div>
    </main>

    <div id="lightbox" class="lightbox" onclick="closeLightboxOnBackground(event)">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">&#8249;</button>
        <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">&#8250;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <p id="lightbox-caption" class="lightbox-caption"></p>
        </div>
    </div>

        function init() {
            allImages = screenshotData.map(item => {
                const title = item.file.replace(/\.png$/i, '').replace(/_/g, ' ');
                const encodedFile = encodeURIComponent(item.file);
                return {
                    src: `artifacts/screenshots/${encodedFile}`,
                    thumb: `artifacts/screenshots/${encodedFile}`,
                    title: title,
                    category: item.cat,
                    originalFile: item.file
                };
            });

            document.getElementById('loading').style.display = 'none';
            applyFilters();
        }

        function setCategory(cat) {
            currentCategory = cat;
            currentPage = 1;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.cat === cat);
            });
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            filteredImages = allImages.filter(img => {
                const matchesCategory = currentCategory === 'all' || img.category === currentCategory;
                const matchesSearch = img.title.toLowerCase().includes(searchTerm) ||
                                     img.originalFile.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });

            updateStats();
            renderGallery();
            renderPagination();
        }

        function updateStats() {
            const total = filteredImages.length;
            const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
            document.getElementById('stats').textContent = `${total} of ${allImages.length} shown • ${totalPages} pages`;
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            const empty = document.getElementById('empty');

            if (filteredImages.length === 0) {
                gallery.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            gallery.style.display = 'grid';
            empty.style.display = 'none';

            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = Math.min(start + ITEMS_PER_PAGE, filteredImages.length);
            const pageImages = filteredImages.slice(start, end);

            gallery.innerHTML = pageImages.map((img, index) => {
                const globalIndex = start + index;
                const badge = img.category === 'ai' ? '🤖 AI' :
                             img.category === 'video' ? '🎬 Video' : '📸';
                return `
                    <div class="gallery-item" onclick="openLightbox(${globalIndex})">
                        <span class="item-badge">${badge}</span>
                        <img src="${img.thumb}" alt="${img.title}" loading="lazy">
                        <div class="item-overlay">
                            <div class="item-title">${img.title}</div>
                            <div class="item-meta">${globalIndex + 1} of ${filteredImages.length}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredImages.length / ITEMS_PER_PAGE);

            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            let buttons = [];
            buttons.push(`<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>`);

            const maxButtons = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage < maxButtons - 1) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            if (startPage > 1) {
                buttons.push(`<button onclick="goToPage(1)">1</button>`);
                if (startPage > 2) buttons.push(`<span class="pagination-info">...</span>`);
            }

            for (let i = startPage; i <= endPage; i++) {
                buttons.push(`<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`);
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) buttons.push(`<span class="pagination-info">...</span>`);
                buttons.push(`<button onclick="goToPage(${totalPages})">${totalPages}</button>`);
            }

            buttons.push(`<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`);
            buttons.push(`<span class="pagination-info">Page ${currentPage} of ${totalPages}</span>`);
            pagination.innerHTML = buttons.join('');
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filteredImages.length / ITEMS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderGallery();
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openLightbox(index) {
            currentImageIndex = index;
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeLightboxOnBackground(event) {
            if (event.target === event.currentTarget) {
                closeLightbox();
            }
        }

        function updateLightbox() {
            const img = filteredImages[currentImageIndex];
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox-caption').textContent =
                `${img.title} (${currentImageIndex + 1} of ${filteredImages.length}) [${img.category.toUpperCase()}]`;
        }

        function navigateLightbox(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = filteredImages.length - 1;
            if (currentImageIndex >= filteredImages.length) currentImageIndex = 0;
            updateLightbox();
        }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            switch (e.key) {
                case 'Escape': closeLightbox(); break;
                case 'ArrowLeft': navigateLightbox(-1); break;
                case 'ArrowRight': navigateLightbox(1); break;
            }
        });

        init();
    </script>

        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        @media (min-width: 1200px) {
            .gallery {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }
        }

        /* Gallery Item */
        .gallery-item {
            position: relative;
            aspect-ratio: 4/3;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: var(--accent);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .item-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            font-size: 0.85rem;
            color: var(--text-primary);
            z-index: 2;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gallery-item:hover .item-title {
            transform: translateY(0);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 2rem 0;
        }

        .pagination button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            min-width: 40px;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--accent);
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 600;
        }

        .pagination-info {
            color: var(--text-secondary);
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            position: relative;
            max-width: 95vw;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .lightbox-caption {
            margin-top: 1rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            text-align: center;
            max-width: 800px;
            padding: 0 1rem;
        }

        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
        }

        .lightbox-prev {
            left: -70px;
        }

        .lightbox-next {
            right: -70px;
        }

        @media (max-width: 900px) {
            .lightbox-prev {
                left: 10px;
            }
            .lightbox-next {
                right: 10px;
            }
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>

        function init() {
            images = screenshotFiles.map(filename => ({
                src: `artifacts/screenshots/${encodeURIComponent(filename)}`,
                thumb: `artifacts/screenshots/${encodeURIComponent(filename)}`,
                title: filename.replace(/\.png$/i, '').replace(/_/g, ' ')
            }));

            document.getElementById('loading').style.display = 'none';

            if (images.length === 0) {
                document.getElementById('empty').style.display = 'block';
                return;
            }

            document.getElementById('gallery').style.display = 'grid';
            document.getElementById('pagination').style.display = 'flex';
            updateStats();
            renderGallery();
            renderPagination();
        }

        function updateStats() {
            const total = images.length;
            const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
            document.getElementById('stats').textContent = `${total} screenshots • ${totalPages} pages`;
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = Math.min(start + ITEMS_PER_PAGE, images.length);
            const pageImages = images.slice(start, end);

            gallery.innerHTML = pageImages.map((img, index) => `
                <div class="gallery-item" onclick="openLightbox(${start + index})">
                    <img src="${img.thumb}" alt="${img.title}" loading="lazy">
                    <div class="item-title">${img.title}</div>
                </div>
            `).join('');

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(images.length / ITEMS_PER_PAGE);

            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }

            let buttons = [];

            // Previous button
            buttons.push(`<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>`);

            // First page
            if (currentPage > 3) {
                buttons.push(`<button onclick="goToPage(1)">1</button>`);
                if (currentPage > 4) {
                    buttons.push(`<span class="pagination-info">...</span>`);
                }
            }

            // Page numbers around current
            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                buttons.push(`<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`);
            }

            // Last page
            if (currentPage < totalPages - 2) {
                if (currentPage < totalPages - 3) {
                    buttons.push(`<span class="pagination-info">...</span>`);
                }
                buttons.push(`<button onclick="goToPage(${totalPages})">${totalPages}</button>`);
            }

            // Next button
            buttons.push(`<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`);

            // Info
            buttons.push(`<span class="pagination-info">Page ${currentPage} of ${totalPages}</span>`);

            pagination.innerHTML = buttons.join('');
        }

        function goToPage(page) {
            const totalPages = Math.ceil(images.length / ITEMS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderGallery();
            renderPagination();
        }

        function openLightbox(index) {
            currentImageIndex = index;
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateLightbox() {
            const img = images[currentImageIndex];
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox-caption').textContent = `${img.title} (${currentImageIndex + 1} of ${images.length})`;
        }

        function navigateLightbox(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = images.length - 1;
            if (currentImageIndex >= images.length) currentImageIndex = 0;
            updateLightbox();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;

            switch (e.key) {
                case 'Escape':
                    closeLightbox();
                    break;
                case 'ArrowLeft':
                    navigateLightbox(-1);
                    break;
                case 'ArrowRight':
                    navigateLightbox(1);
                    break;
            }
        });

        // Close lightbox when clicking outside
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeLightbox();
            }
        });

        // Initialize
        init();
    </script>
